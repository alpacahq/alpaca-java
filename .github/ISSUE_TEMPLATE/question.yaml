name: ❓ Question about the SDK
description: I have a question about the SDK that I cannot find an answer to in the documentation or README.
title: "[Question]: "
labels: [ kind/question ]
assignees:
  -
body:
  - type: markdown
    attributes:
      value: |
        Please fill the form in English.

  - type: checkboxes
    attributes:
      label: Pre-submit checklist
      description: |
        Please verify all boxes before opening this issue. Issues that violate any of the below will be closed as invalid.
      options:
        - label: I have searched the existing issues to ensure there is not already an open issue about this question.
          required: true
        - label: My question is about the Java SDK and not a general question about the Alpaca API. (If it is, please open an issue [here](https://github.com/alpacahq/Alpaca-API) instead.)
          required: true
        - label: My question is not about implementing a specific trading algorithm or requesting trade advice (these are outside the scope of this repo).
          required: true

  - type: textarea
    attributes:
      label: Question
      description: Please describe your question here.
      placeholder: |
        I could not find an example or documentation on X. How do I do X?
        ```java
        // relevant code snippet
        ```
    validations:
      required: true
