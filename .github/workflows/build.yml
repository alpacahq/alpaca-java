name: Build

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  markdown-links:
    name: Markdown links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout client
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          fail: true
          args: >-
            --offline
            --no-progress
            --root-dir ${{ github.workspace }}
            --fallback-extensions md,mdx,html
            --include-fragments
            README.md
            AGENTS.md
            LLMS.md
            CONTRIBUTING.md
            CHANGELOG.md
            examples/README.md
            docs/README.md

  docs:
    name: Docusaurus docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout client
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        run: npm ci --prefix docs

      - name: Build docs
        run: npm run build --prefix docs

  release-tools:
    name: Release tooling tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout client
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Test release tooling
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: python3 -m unittest discover -s scripts/tests -p 'test_*.py' -v

  build:
    name: Gradle build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout client
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Code checks
        run: ./gradlew spotlessCheck checkstyleMain checkstyleTest spotbugsMain

      - name: Build
        run: ./gradlew build

  publish-snapshot:
    name: Publish snapshot to Maven Central
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - build
      - release-tools
    uses: ./.github/workflows/publish-snapshot.yml
    with:
      commit: ${{ github.sha }}
    secrets:
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
