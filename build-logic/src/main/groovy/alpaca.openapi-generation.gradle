import markets.alpaca.gradle.AlpacaBuildProperties
import markets.alpaca.gradle.OpenApiSpecSupport
import org.openapitools.generator.gradle.plugin.tasks.GenerateTask

import java.time.Instant
import java.time.ZoneId
import java.time.format.DateTimeFormatter

plugins {
    id 'org.openapi.generator'
}

def localProperties = AlpacaBuildProperties.loadLocalProperties(project)
def specSources = AlpacaBuildProperties.resolveSpecSources(project, localProperties)
def brokerSpecSource = specSources.broker
def dataSpecSource = specSources.data
def tradingSpecSource = specSources.trading
def preprocessedSpecInputs = providers
    .gradleProperty('alpaca.preprocessedSpecInputs')
    .map { it.toBoolean() }
    .getOrElse(false)

def generatedBrokerDir = layout.buildDirectory.dir('generated/broker')
def generatedDataDir = layout.buildDirectory.dir('generated/data')
def generatedTradingDir = layout.buildDirectory.dir('generated/trading')
def openApiTemplateDir = layout.projectDirectory.dir('src/main/openapi-templates/Java')

def preprocessedBrokerSpec = layout.buildDirectory.file('specs/broker/openapi.yaml')
def preprocessedDataSpec = layout.buildDirectory.file('specs/data/openapi.yaml')
def preprocessedTradingSpec = layout.buildDirectory.file('specs/trading/openapi.yaml')

def commonConfigOptions = [
    library: 'okhttp-gson',
    dateLibrary: 'java8',
    hideGenerationTimestamp: 'true',
    openApiNullable: 'false',
    generateApiTests: 'false',
    generateModelTests: 'false',
    generateApiDocumentation: 'false',
    generateModelDocumentation: 'false',
    serializableModel: 'true',
    useBeanValidation: 'false',
    useJakartaEe: 'false',
    disallowAdditionalPropertiesIfNotPresent: 'false',
]
def commonTypeMappings = [
    'number+decimal': 'BigDecimal',
    'string+decimal': 'BigDecimal',
]

tasks.register('preprocessBrokerSpec') {
    group = 'openapi tools'
    description = 'Sanitises the broker OpenAPI spec before code generation'

    if (OpenApiSpecSupport.isUrl(brokerSpecSource)) {
        outputs.upToDateWhen { false }
    } else {
        inputs.files(file(brokerSpecSource))
    }
    inputs.property('preprocessedSpecInputs', preprocessedSpecInputs)
    outputs.file(preprocessedBrokerSpec)

    doLast {
        def outputFile = preprocessedBrokerSpec.get().asFile
        outputFile.parentFile.mkdirs()
        if (preprocessedSpecInputs) {
            if (OpenApiSpecSupport.isUrl(brokerSpecSource)) {
                throw new GradleException(
                    'alpaca.preprocessedSpecInputs requires local spec files')
            }
            outputFile.bytes = file(brokerSpecSource).bytes
            return
        }
        def spec = OpenApiSpecSupport.loadSpec(brokerSpecSource) as Map
        OpenApiSpecSupport.removeEmptyKeyProperties(spec)
        OpenApiSpecSupport.removeDiscriminatorEnums(spec)
        OpenApiSpecSupport.removeActivityV2DetailTrdRequired(spec)
        outputFile.text = OpenApiSpecSupport.dumpYaml(spec)
    }
}

tasks.register('preprocessDataSpec') {
    group = 'openapi tools'
    description = 'Sanitises the market-data OpenAPI spec before code generation'

    if (OpenApiSpecSupport.isUrl(dataSpecSource)) {
        outputs.upToDateWhen { false }
    } else {
        inputs.files(file(dataSpecSource))
    }
    inputs.property('preprocessedSpecInputs', preprocessedSpecInputs)
    outputs.file(preprocessedDataSpec)

    doLast {
        def outputFile = preprocessedDataSpec.get().asFile
        outputFile.parentFile.mkdirs()
        if (preprocessedSpecInputs) {
            if (OpenApiSpecSupport.isUrl(dataSpecSource)) {
                throw new GradleException(
                    'alpaca.preprocessedSpecInputs requires local spec files')
            }
            outputFile.bytes = file(dataSpecSource).bytes
            return
        }
        def spec = OpenApiSpecSupport.loadSpec(dataSpecSource) as Map
        OpenApiSpecSupport.removeInternalSchemaMarkers(spec)
        outputFile.text = OpenApiSpecSupport.dumpYaml(spec)
    }
}

tasks.register('preprocessTradingSpec') {
    group = 'openapi tools'
    description = 'Sanitises the trading OpenAPI spec before code generation'

    if (OpenApiSpecSupport.isUrl(tradingSpecSource)) {
        outputs.upToDateWhen { false }
    } else {
        inputs.files(file(tradingSpecSource))
    }
    inputs.property('preprocessedSpecInputs', preprocessedSpecInputs)
    outputs.file(preprocessedTradingSpec)

    doLast {
        def outputFile = preprocessedTradingSpec.get().asFile
        outputFile.parentFile.mkdirs()
        if (preprocessedSpecInputs) {
            if (OpenApiSpecSupport.isUrl(tradingSpecSource)) {
                throw new GradleException(
                    'alpaca.preprocessedSpecInputs requires local spec files')
            }
            outputFile.bytes = file(tradingSpecSource).bytes
            return
        }
        def spec = OpenApiSpecSupport.loadSpec(tradingSpecSource) as Map
        OpenApiSpecSupport.removeActivityV2DetailTrdRequired(spec)
        OpenApiSpecSupport.requireDistinctAccountActivityTypes(spec)
        outputFile.text = OpenApiSpecSupport.dumpYaml(spec)
    }
}

tasks.register('generateBrokerApi', GenerateTask) {
    dependsOn 'preprocessBrokerSpec'
    group = 'openapi tools'
    description = 'Generates Broker API client from OpenAPI spec'
    generatorName = 'java'
    inputSpec = preprocessedBrokerSpec
    outputDir = generatedBrokerDir
    apiPackage = 'markets.alpaca.client.openapi.broker.api'
    modelPackage = 'markets.alpaca.client.openapi.broker.model'
    invokerPackage = 'markets.alpaca.client.openapi.broker.http'
    configOptions = commonConfigOptions
    typeMappings = commonTypeMappings
    templateDir = openApiTemplateDir.asFile.absolutePath
    cleanupOutput = true
    skipValidateSpec = false

    doLast {
        OpenApiSpecSupport.writeOpenApiPackageInfo(
            generatedBrokerDir.get().asFile,
            'Broker API',
            preprocessedBrokerSpec.get().asFile.absolutePath,
            'markets.alpaca.client.openapi.broker',
            apiPackage.get(),
            modelPackage.get(),
            invokerPackage.get())
    }
}

tasks.register('generateDataApi', GenerateTask) {
    dependsOn 'preprocessDataSpec'
    group = 'openapi tools'
    description = 'Generates Market Data API client from OpenAPI spec'
    generatorName = 'java'
