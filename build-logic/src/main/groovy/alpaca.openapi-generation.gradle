tasks.register('generateApis') {
    group = 'openapi tools'
    description = 'Generates all three Alpaca API clients (Broker, Data, Trading)'
    dependsOn 'generateBrokerApi', 'generateDataApi', 'generateTradingApi'
}

def printSpecVersionsEnabled = !providers
    .gradleProperty('alpaca.skipSpecVersions')
    .map { it.toBoolean() }
    .getOrElse(false)

if (printSpecVersionsEnabled) {
    tasks.named('generateApis').configure {
        dependsOn 'printSpecVersions'
    }
    ['generateBrokerApi', 'generateDataApi', 'generateTradingApi'].each { taskName ->
        tasks.named(taskName).configure {
            dependsOn 'printSpecVersions'
        }
    }
}

tasks.register('printSpecVersions') {
    group = 'openapi tools'
    description = 'Prints the version and source of each OAS spec'

    def specEntries = [
        [api: 'broker', source: brokerSpecSource],
        [api: 'data', source: dataSpecSource],
        [api: 'trading', source: tradingSpecSource],
    ]

    if (specEntries.any { OpenApiSpecSupport.isUrl(it.source as String) }) {
        outputs.upToDateWhen { false }
    }
    def localSpecFiles = specEntries
        .findAll { !OpenApiSpecSupport.isUrl(it.source as String) }
        .collect { file(it.source) }
    if (localSpecFiles) {
        inputs.files(localSpecFiles)
    }

    def stampFile = layout.buildDirectory.file('specs/.print-versions-stamp')
    outputs.file(stampFile)

    doLast {
        println ''
        println 'OAS specs:'
        specEntries.each { entry ->
            def source = entry.source as String
            def spec = OpenApiSpecSupport.loadSpec(source)
            def version = spec?.info?.version ?: 'unknown'
            if (OpenApiSpecSupport.isUrl(source)) {
                printf(
                    '  %-10s  v%-12s  source: %s%n',
                    entry.api,
                    version,
                    source)
            } else {
                def specFile = file(source)
                def modified = Instant.ofEpochMilli(specFile.lastModified())
                    .atZone(ZoneId.systemDefault())
                    .format(DateTimeFormatter.ofPattern('yyyy-MM-dd HH:mm'))
                printf(
                    '  %-10s  v%-12s  source: %s  (last modified: %s)%n',
                    entry.api,
                    version,
                    specFile.absolutePath,
                    modified)
            }
        }
        println ''
        stampFile.get().asFile.text = Instant.now().toString()
    }
}

pluginManager.withPlugin('java') {
    tasks.matching {
        it.name in ['compileJava', 'sourcesJar', 'javadocJar', 'javadoc']
    }.configureEach {
        dependsOn 'generateApis'
    }

    sourceSets {
        main {
            java {
                srcDir generatedBrokerDir.map { it.dir('src/main/java') }
                srcDir generatedDataDir.map { it.dir('src/main/java') }
                srcDir generatedTradingDir.map { it.dir('src/main/java') }
            }
        }
    }
}
