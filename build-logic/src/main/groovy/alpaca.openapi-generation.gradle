    outputDir = generatedDataDir
    apiPackage = 'markets.alpaca.client.openapi.data.api'
    modelPackage = 'markets.alpaca.client.openapi.data.model'
    invokerPackage = 'markets.alpaca.client.openapi.data.http'
    configOptions = commonConfigOptions
    typeMappings = commonTypeMappings
    templateDir = openApiTemplateDir.asFile.absolutePath
    cleanupOutput = true
    skipValidateSpec = false

    doLast {
        OpenApiSpecSupport.writeOpenApiPackageInfo(
            generatedDataDir.get().asFile,
            'Market Data API',
            preprocessedDataSpec.get().asFile.absolutePath,
            'markets.alpaca.client.openapi.data',
            apiPackage.get(),
            modelPackage.get(),
            invokerPackage.get())
    }
}

tasks.register('generateTradingApi', GenerateTask) {
    dependsOn 'preprocessTradingSpec'
    group = 'openapi tools'
    description = 'Generates Trading API client from OpenAPI spec'
    generatorName = 'java'
    inputSpec = preprocessedTradingSpec
