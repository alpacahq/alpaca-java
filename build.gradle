// ---------------------------------------------------------------------------
// Shared YAML helpers used by preprocessing tasks
// ---------------------------------------------------------------------------

/** Dump a parsed YAML tree back to a formatted YAML string. */
static String dumpYaml(Object tree) {
    def opts = new DumperOptions()
    opts.setDefaultFlowStyle(DumperOptions.FlowStyle.BLOCK)
    opts.setIndent(2)
    opts.setIndicatorIndent(2)
    opts.setIndentWithIndicator(true)
    opts.setWidth(200)
    new Yaml(opts).dump(tree)
}

/** Returns true if the source string is an HTTP or HTTPS URL. */
static boolean isUrl(String source) {
    source?.startsWith('http://') || source?.startsWith('https://')
}

/**
 * Load an OAS spec from a local file path or a remote URL.
 * SnakeYAML handles both YAML and JSON (JSON is a valid YAML subset).
 */
static Object loadSpec(String source) {
    if (isUrl(source)) {
        def connection = new URI(source).toURL().openConnection()
        connection.connectTimeout = 15_000
        connection.readTimeout = 30_000
        connection.getInputStream().withCloseable { stream -> new Yaml().load(stream) }
    } else {
        new File(source).withInputStream { stream -> new Yaml().load(stream) }
    }
}

/**
 * Walks every schema in {@code components.schemas} and normalises any property
 * used as a {@code discriminator.propertyName} to a plain {@code string}.
 *
 * <p><b>Problem (openapi-generator ≤ 7.22):</b> when the discriminator property
 * had an inline {@code enum}, the generator emitted
 * {@code this.field = this.getClass().getSimpleName()} in the parent constructor
 * — a Java type error because the field is an enum, not a String.
 *
 * <p><b>Problem (openapi-generator 7.23+):</b> {@code setEnumDiscriminatorDefaultValue}
 * was added to fix the above, but it crashes with {@code NullPointerException} when
 * called on the <em>parent</em> schema: it tries to look up the parent's name in the
 * discriminator mapping (which only contains child names), falls through, and calls
 * {@code var.allowableValues.get("values")} — NPE when {@code allowableValues} is null
 * (which it is for both inline-enum and {@code $ref}-to-enum properties on the parent
 * model). The generator skips the crash guard only when
 * {@code discriminator.isEnum || var.isEnum} — so the fix is to ensure neither is true
 * on the parent schema.
 *
 * <p><b>Fix:</b> for every schema that has a discriminator (top-level <em>or</em> nested
 * inside an {@code allOf} item), find the discriminator property in all {@code allOf}
 * parts and replace it with a bare {@code {type: string}}.  This makes the property a
 * plain {@code String} in Java, which is correct, and prevents both class of error.
 */
static void removeDiscriminatorEnums(Map spec) {
    def schemas = spec?.components?.schemas
    if (!(schemas instanceof Map)) return

    schemas.each { schemaName, schema ->
        if (!(schema instanceof Map)) return

        def allOf = schema.allOf
        if (!(allOf instanceof List)) return

        // Collect discriminator property names from:
        //   1. The schema's own top-level discriminator  (e.g. Journal)
        //   2. Any discriminator nested inside an allOf item
        def discPropNames = new LinkedHashSet<String>()

        def topProp = schema?.discriminator?.propertyName as String
        if (topProp) discPropNames << topProp

        allOf.each { part ->
            if (part instanceof Map) {
                def propName = part?.discriminator?.propertyName as String
                if (propName) discPropNames << propName
            }
        }

        if (!discPropNames) return

        // Normalise each discriminator property to {type: string}.
        // This handles both inline enum and $ref-to-enum variants.
        allOf.each { part ->
            if (!(part instanceof Map)) return
            discPropNames.each { propName ->
                def prop = part?.properties?.get(propName)
                if (!(prop instanceof Map)) return
                prop.clear()
                prop.type = 'string'
            }
        }
    }
}

/**
 * Removes all {@code x-internal: true} vendor-extension entries from every schema.
 *
 * <p>openapi-generator skips schemas marked {@code x-internal: true}, which
 * causes a compile error in any generated model that references the skipped class.
 */
static void removeInternalSchemaMarkers(Map spec) {
    def schemas = spec?.components?.schemas
    if (!(schemas instanceof Map)) return
    schemas.each { name, schema ->
        if (schema instanceof Map) schema.remove('x-internal')
    }
}

/**
 * Removes YAML properties whose key is the empty string ({@code '': ...}).
 * These are valid YAML but produce uncompilable Java (blank field/method names).
 */
static void removeEmptyKeyProperties(Map spec) {
    def schemas = spec?.components?.schemas
    if (!(schemas instanceof Map)) return

    schemas.each { schemaName, schema ->
        if (schema instanceof Map) {
            schema.properties?.remove('')
            // Also walk allOf / oneOf / anyOf sub-schemas
            ['allOf', 'oneOf', 'anyOf'].each { keyword ->
                schema[keyword]?.each { part ->
                    if (part instanceof Map) part.properties?.remove('')
                }
            }
        }
    }
}

/**
 * Removes the {@code required} list from {@code ActivityV2DetailTRD}.
 *
 * <p>Root cause: {@code ActivityEventV2.allOf[1].properties.details} is an
 * anonymous {@code oneOf[ActivityV2DetailTRD, ActivityV2DetailNTA]}. When the
 * generator resolves that anonymous type it iterates over all ~40 sub-schemas
 * inside {@code ActivityV2DetailNTA} and checks whether each required field
 * from {@code ActivityV2DetailTRD} is present. Those fields are TRD-specific
 * and absent from every NTA schema, so the check fires once per NTA variant —
 * producing ~40 "Required var X not in properties" warnings per field.
 *
 * <p>All seven affected fields are still listed under {@code properties}, so
 * removing {@code required} only silences the generator; it does not change
 * which fields are generated or their Java types.
 */
static void removeActivityV2DetailTrdRequired(Map spec) {
    def schema = spec?.components?.schemas?.get('ActivityV2DetailTRD')
    if (schema instanceof Map) schema.remove('required')
}

/** Escapes plain text for use in generated Javadoc HTML. */
static String javadocText(Object value) {
    def text = value == null ? '' : value.toString().trim()
    text
        .replace('&', '&amp;')
        .replace('<', '&lt;')
        .replace('>', '&gt;')
}

/** Writes package-level Javadocs for generated OpenAPI packages. */
static void writeOpenApiPackageInfo(
    File outputDir,
    String apiName,
    String specSource,
    String rootPackage,
    String apiPackage,
    String modelPackage,
    String invokerPackage
) {
    def spec = loadSpec(specSource)
    def title = javadocText(spec?.info?.title ?: apiName)
    def version = javadocText(spec?.info?.version ?: 'unknown')
    def description = javadocText(spec?.info?.description)
    def apiLabel = javadocText(apiName)

    def packageDocs = [
        (rootPackage): """
            /**
             * Generated REST client packages for the ${apiLabel}.
             *
             * <p>Generated from the configured OpenAPI spec: <b>${title}</b>, version
             * <b>${version}</b>.</p>
             * ${description ? "<p>${description}</p>" : ""}
             *
             * <p>The {@code api} package contains endpoint clients, {@code model} contains
             * request/response DTOs and enums, and {@code http} contains the generated transport,
             * serialization, callback, response, and exception types. Use
             * {@link markets.alpaca.client.AlpacaClientFactory} to create these clients with the
             * correct Alpaca authentication scheme.</p>
             */
            package ${rootPackage};
        """,
        (apiPackage): """
            /**
             * Generated endpoint clients for the ${apiLabel}.
             *
             * <p>Classes in this package map OpenAPI operations to Java methods. Method Javadocs
             * include operation summaries, descriptions, parameters, response details, and external
             * documentation links when those fields are present in the OpenAPI spec.</p>
             *
             * <p>Prefer creating clients through {@link markets.alpaca.client.AlpacaClientFactory}
             * so base URLs, authentication, and HTTP client configuration are applied correctly.</p>
             */
            package ${apiPackage};
        """,
        (modelPackage): """
            /**
             * Generated request and response models for the ${apiLabel}.
             *
             * <p>Model class and accessor Javadocs are generated from OpenAPI schema descriptions,
             * property descriptions, enum values, nullability, and deprecation metadata when those
             * fields are present in the spec.</p>
             */
            package ${modelPackage};
        """,
        (invokerPackage): """
            /**
             * Generated HTTP transport support for the ${apiLabel}.
             *
             * <p>This package contains the generated {@code ApiClient}, {@code ApiException},
             * {@code ApiResponse}, JSON serialization helpers, callbacks, and request/response
             * support classes used by the generated endpoint clients.</p>
             */
            package ${invokerPackage};
        """,
        ("${invokerPackage}.auth"): """
            /**
             * Generated authentication helpers for the ${apiLabel}.
             *
             * <p>Applications normally do not configure these classes directly. Use
             * {@link markets.alpaca.client.AlpacaClientFactory}, which wires Alpaca credentials
             * into the generated authentication objects for each API.</p>
             */
            package ${invokerPackage}.auth;
        """,
    ]

    packageDocs.each { packageName, content ->
        def packageDir = new File(outputDir, "src/main/java/${packageName.replace('.', '/')}")
        packageDir.mkdirs()
        new File(packageDir, 'package-info.java').text = content.stripIndent().trim() + System.lineSeparator()
    }
}

// ---------------------------------------------------------------------------
// Broker spec preprocessing
//   1. Remove empty-key properties  (→ blank Java identifiers)
//   2. Remove enum from discriminator properties  (→ String-vs-enum type error)
//   3. Remove required list from ActivityV2DetailTRD  (→ false-positive warnings)
// ---------------------------------------------------------------------------
tasks.register('preprocessBrokerSpec') {
    group       = 'openapi tools'
    description = 'Sanitises the broker OpenAPI spec before code generation'

    if (isUrl(brokerSpecSource)) {
        outputs.upToDateWhen { false }
    } else {
        inputs.files(file(brokerSpecSource))
    }
    outputs.file(preprocessedBrokerSpec)

    doLast {
        def outputFile = preprocessedBrokerSpec.get().asFile
        outputFile.parentFile.mkdirs()
        def spec = loadSpec(brokerSpecSource) as Map
        removeEmptyKeyProperties(spec)
        removeDiscriminatorEnums(spec)
        removeActivityV2DetailTrdRequired(spec)
        outputFile.text = dumpYaml(spec)
    }
}

// ---------------------------------------------------------------------------
// Data spec preprocessing
//   Remove x-internal: true markers that cause referenced schemas to be skipped
// ---------------------------------------------------------------------------
tasks.register('preprocessDataSpec') {
    group       = 'openapi tools'
    description = 'Sanitises the market-data OpenAPI spec before code generation'

    if (isUrl(dataSpecSource)) {
        outputs.upToDateWhen { false }
    } else {
        inputs.files(file(dataSpecSource))
    }
    outputs.file(preprocessedDataSpec)

    doLast {
        def outputFile = preprocessedDataSpec.get().asFile
        outputFile.parentFile.mkdirs()
        def spec = loadSpec(dataSpecSource) as Map
        removeInternalSchemaMarkers(spec)
        outputFile.text = dumpYaml(spec)
    }
}

// ---------------------------------------------------------------------------
// Trading spec preprocessing
//   Remove required list from ActivityV2DetailTRD  (→ false-positive warnings)
// ---------------------------------------------------------------------------
tasks.register('preprocessTradingSpec') {
    group       = 'openapi tools'
    description = 'Sanitises the trading OpenAPI spec before code generation'

    if (isUrl(tradingSpecSource)) {
