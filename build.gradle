// ---------------------------------------------------------------------------
// Aggregate task: generates all three APIs (can run in parallel with --parallel)
// ---------------------------------------------------------------------------
tasks.register('generateApis') {
    group       = 'openapi tools'
    description = 'Generates all three Alpaca API clients (Broker, Data, Trading)'
    dependsOn 'generateBrokerApi', 'generateDataApi', 'generateTradingApi'
}

def printSpecVersionsEnabled = !providers.gradleProperty('alpaca.skipSpecVersions')
    .map { it.toBoolean() }
    .getOrElse(false)

if (printSpecVersionsEnabled) {
    tasks.named('generateApis').configure { dependsOn 'printSpecVersions' }
    ['generateBrokerApi', 'generateDataApi', 'generateTradingApi'].each { name ->
        tasks.named(name).configure { dependsOn 'printSpecVersions' }
    }
}

// ---------------------------------------------------------------------------
// Informational task: print version and source for each OAS spec.
// Uses local spec files as inputs (when applicable) and a stamp file as output
// so Gradle skips this task (UP-TO-DATE) when local specs haven't changed.
// URL-sourced specs always re-fetch (outputs.upToDateWhen { false }).
// ---------------------------------------------------------------------------
tasks.register('printSpecVersions') {
    group       = 'openapi tools'
    description = 'Prints the version and source of each OAS spec'

    def specEntries = [
        [api: 'broker',  source: brokerSpecSource],
        [api: 'data',    source: dataSpecSource],
        [api: 'trading', source: tradingSpecSource],
    ]

    def hasUrlSource = specEntries.any { isUrl(it.source as String) }
    if (hasUrlSource) {
        outputs.upToDateWhen { false }
    }
    def localSpecFiles = specEntries.findAll { !isUrl(it.source as String) }.collect { file(it.source) }
    if (localSpecFiles) {
        inputs.files(localSpecFiles)
    }

    def stampFile = layout.buildDirectory.file('specs/.print-versions-stamp')
    outputs.file(stampFile)

    doLast {
        println ''
        println 'OAS specs:'
        specEntries.each { entry ->
            def src     = entry.source as String
            def spec    = loadSpec(src)
            def version = spec?.info?.version ?: 'unknown'
            if (isUrl(src)) {
                printf '  %-10s  v%-12s  source: %s%n', entry.api, version, src
            } else {
                def f        = file(src)
                def modified = Instant.ofEpochMilli(f.lastModified())
                    .atZone(ZoneId.systemDefault())
                    .format(DateTimeFormatter.ofPattern('yyyy-MM-dd HH:mm'))
                printf '  %-10s  v%-12s  source: %s  (last modified: %s)%n', entry.api, version, f.absolutePath, modified
            }
        }
        println ''
        stampFile.get().asFile.text = Instant.now().toString()
    }
}

// Generated sources live in build/ (gitignored) and are produced at build time.
// Each API has its own http package (different base URLs, server configs) so the
// three source trees are fully disjoint and can be added as separate source roots.
tasks.named('compileJava').configure { dependsOn 'generateApis' }
tasks.named('sourcesJar').configure  { dependsOn 'generateApis' }
tasks.named('javadocJar').configure  { dependsOn 'generateApis' }

def rootBuildPrintsSpecVersions = false
gradle.taskGraph.whenReady { graph ->
    rootBuildPrintsSpecVersions = graph.hasTask(':printSpecVersions')
}

tasks.register('compileExamples', Exec) {
    group = 'verification'
    description = 'Compiles the example project without including it in published artifacts'
    workingDir = rootDir
    def gradleWrapper = System.getProperty('os.name').toLowerCase(Locale.ROOT).contains('windows')
        ? 'gradlew.bat'
        : './gradlew'
    doFirst {
        def forwardedProperties = gradle.startParameter.projectProperties.collect { key, value -> "-P${key}=${value}" }
        def nestedBuildProperties = rootBuildPrintsSpecVersions
            ? forwardedProperties + ['-Palpaca.skipSpecVersions=true']
            : forwardedProperties
        // Suppress the included build only when the root build has already printed
        // the spec versions for this Gradle invocation.
        commandLine([gradleWrapper, '-p', 'examples', 'compileJava'] + nestedBuildProperties)
    }
}

sourceSets {
    main {
        java {
            srcDir generatedBrokerDir.map  { it.dir('src/main/java') }
            srcDir generatedDataDir.map    { it.dir('src/main/java') }
            srcDir generatedTradingDir.map { it.dir('src/main/java') }
        }
    }
}

// ---------------------------------------------------------------------------
// Dependencies
// ---------------------------------------------------------------------------
dependencies {
    // OkHttp (HTTP transport + logging)
    api libs.okhttp
    api libs.okhttp.sse
    api libs.okhttp.logging

    // Gson (JSON serialization used by okhttp-gson generator)
    implementation libs.gson
    implementation libs.gson.fire

    // OpenAPI / Swagger annotations (used in generated models — annotations only, no runtime)
    compileOnly libs.swagger.annotations

    // JSR-305 / javax.annotation (used by generated code when useJakartaEe=false)
    compileOnly libs.jsr305
    compileOnly libs.javax.annotation.api

    // Apache Commons Lang (utilities used by generated code)
    implementation libs.commons.lang3

    // Testing
    testImplementation libs.junit.jupiter
    testImplementation libs.mockwebserver
    testRuntimeOnly    libs.junit.platform.launcher
}

// ---------------------------------------------------------------------------
// Publishing
// ---------------------------------------------------------------------------
publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            pom {
                name = 'Alpaca Java Client'
                description = 'Java client for Alpaca Markets REST and WebSocket APIs'
                url = 'https://github.com/alpacahq/alpaca-java-client'
                licenses {
                    license {
                        name = 'Apache License, Version 2.0'
                        url = 'https://www.apache.org/licenses/LICENSE-2.0'
                    }
                }
                developers {
                    developer {
                        organization = 'Alpaca'
                        organizationUrl = 'https://alpaca.markets'
                    }
                }
                scm {
                    connection = 'scm:git:https://github.com/alpacahq/alpaca-java-client.git'
                    developerConnection = 'scm:git:ssh://git@github.com:alpacahq/alpaca-java-client.git'
                    url = 'https://github.com/alpacahq/alpaca-java-client'
                }
            }
        }
    }

    repositories {
        maven {
            name = 'GitHubPackages'
            url = uri('https://maven.pkg.github.com/alpacahq/alpaca-java-client')
            credentials {
                username = System.getenv('GITHUB_ACTOR') ?: ''
                password = System.getenv('GITHUB_TOKEN') ?: ''
            }
        }
    }
}

// Shared test-result summary listener — applied to every Test task below.
def testSummaryListener = new TestListener() {
    @Override void beforeSuite(TestDescriptor suite) {}
    @Override void beforeTest(TestDescriptor test) {}
    @Override void afterTest(TestDescriptor test, TestResult result) {}

    @Override void afterSuite(TestDescriptor suite, TestResult result) {
        if (suite.parent != null) return  // root suite only
        def pct = result.testCount > 0
            ? sprintf('%d%%', (result.successfulTestCount * 100 / result.testCount) as int)
            : 'n/a'
        println "\nTests: ${result.testCount} executed, " +
                "${result.successfulTestCount} passed, " +
                "${result.failedTestCount} failed, " +
                "${result.skippedTestCount} skipped " +
                "(${pct} pass rate) — ${result.resultType}"
    }
}

test {
    useJUnitPlatform {
        excludeTags 'integration'
    }
    finalizedBy jacocoTestReport
    addTestListener(testSummaryListener)
}

tasks.named('check').configure { dependsOn 'compileExamples' }

// ---------------------------------------------------------------------------
// Integration tests
// Requires trading-account credentials for Trading/Data/WebSocket tests and broker-sandbox
// credentials for Broker tests, supplied via local.properties or env vars:
//   tradingApiKeyId        / APCA_TRADING_KEY_ID
//   tradingApiSecretKey    / APCA_TRADING_SECRET_KEY
//   tradingApiEnvironment  / APCA_TRADING_ENVIRONMENT  (optional; defaults to paper)
//   brokerApiKeyId         / APCA_BROKER_KEY_ID
//   brokerApiSecretKey     / APCA_BROKER_SECRET_KEY
//   brokerApiEnvironment   / APCA_BROKER_ENVIRONMENT  (optional; defaults to sandbox)
//
// Run:  ./gradlew integrationTest
// Tests skip automatically (not fail) when credentials are absent.
// ---------------------------------------------------------------------------
tasks.register('integrationTest', Test) {
    group       = 'verification'
    description = 'Runs @Tag("integration") tests against live Alpaca paper APIs'

    useJUnitPlatform {
        includeTags 'integration'
    }

    testClassesDirs = sourceSets.test.output.classesDirs
    classpath       = sourceSets.test.runtimeClasspath
    shouldRunAfter 'test'
    // Always re-run: live API results must never be served from Gradle's task cache.
    outputs.upToDateWhen { false }
    addTestListener(testSummaryListener)

    // Inject credentials from local.properties (if present) as JVM system properties
    // so tests can call System.getProperty(). CI uses environment variables instead.
    def tradingKeyId = firstNonBlank(
        localProps.getProperty('tradingApiKeyId'),
        System.getenv('APCA_TRADING_KEY_ID'))
    def tradingSecret = firstNonBlank(
        localProps.getProperty('tradingApiSecretKey'),
        System.getenv('APCA_TRADING_SECRET_KEY'))
    def tradingEnvironment = localProps.getProperty('tradingApiEnvironment') ?: System.getenv('APCA_TRADING_ENVIRONMENT')
    if (tradingKeyId) systemProperty 'APCA_TRADING_KEY_ID', tradingKeyId
    if (tradingSecret) systemProperty 'APCA_TRADING_SECRET_KEY', tradingSecret
    if (tradingEnvironment) systemProperty 'APCA_TRADING_ENVIRONMENT', tradingEnvironment

    def brokerKeyId  = localProps.getProperty('brokerApiKeyId')     ?: System.getenv('APCA_BROKER_KEY_ID')
    def brokerSecret = localProps.getProperty('brokerApiSecretKey') ?: System.getenv('APCA_BROKER_SECRET_KEY')
    def brokerEnvironment = localProps.getProperty('brokerApiEnvironment') ?: System.getenv('APCA_BROKER_ENVIRONMENT')
    if (brokerKeyId)  systemProperty 'APCA_BROKER_KEY_ID',     brokerKeyId
    if (brokerSecret) systemProperty 'APCA_BROKER_SECRET_KEY', brokerSecret
    if (brokerEnvironment) systemProperty 'APCA_BROKER_ENVIRONMENT', brokerEnvironment
}

// ---------------------------------------------------------------------------
// Code coverage (JaCoCo)
// Scope: handwritten classes only — all generated packages are excluded.
// Reports: build/reports/jacoco/test/html/index.html (HTML) and .xml (CI).
// ---------------------------------------------------------------------------
jacoco {
    toolVersion = libs.versions.jacoco.get()
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required  = true
        html.required = true
    }
    // Restrict coverage to handwritten classes; exclude generated OpenAPI clients.
    classDirectories.setFrom(
        fileTree(dir: layout.buildDirectory.dir('classes/java/main'),
                 exclude: ['markets/alpaca/client/openapi/**'])
    )

    doLast {
        def reportXml = reports.xml.outputLocation.asFile.get()
        if (!reportXml.exists()) return

        // Allow DOCTYPE but suppress the DTD fetch — JaCoCo's report.dtd is not
        // distributed alongside the XML and the parser would fail trying to load it.
        def factory = SAXParserFactory.newInstance()
        factory.setFeature('http://apache.org/xml/features/disallow-doctype-decl', false)
        def xmlParser = new XmlParser(factory.newSAXParser())
        xmlParser.setEntityResolver { publicId, systemId ->
            new InputSource(new StringReader(''))
        }
        def xml = xmlParser.parse(reportXml)

        // Only the <counter> elements that are direct children of <report>
        // represent project-wide totals; nested ones are per-class or per-method.
        def totals = [:]
        xml.counter.each { counter ->
            def covered = (counter.@covered as String).toInteger()
            def missed  = (counter.@missed  as String).toInteger()
            totals[counter.@type as String] = [covered: covered, missed: missed]
        }

        if (totals.isEmpty()) return

        println '\nCoverage (handwritten classes):'
        [['INSTRUCTION', 'Instructions'],
         ['BRANCH',      'Branches    '],
         ['LINE',        'Lines       '],
         ['METHOD',      'Methods     '],
         ['CLASS',       'Classes     ']].each { type, label ->
            def c = totals[type]
            if (!c) return
            def total = c.covered + c.missed
            def pct   = total > 0 ? (c.covered * 100.0 / total) : 0.0
            printf '  %s  %5.1f%%  (%d / %d)%n', label, pct, c.covered, total
        }
        println "  Report → ${reports.html.outputLocation.asFile.get().toURI()}"
    }
}

// Generate sources first so Javadoc includes the REST clients produced from the
// configured Alpaca OpenAPI specs.
tasks.named('javadoc').configure {
    dependsOn 'generateApis'
    description = 'Generates Javadoc API documentation for handwritten helpers and generated REST clients'
    inputs.file(layout.projectDirectory.file('src/main/javadoc/overview.html'))
    options.overview = layout.projectDirectory.file('src/main/javadoc/overview.html').asFile
    options.addBooleanOption('Xdoclint:all,-missing', true)
    options.tags('http.response.details:a:HTTP Response Details:')
    options.quiet()
}

tasks.register('generateJavadocs') {
    group = 'documentation'
    description = 'Generates Javadoc API documentation in build/docs/javadoc'
    dependsOn 'javadoc'
}
