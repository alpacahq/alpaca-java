// SnakeYAML must be declared before the plugins block so the preprocessing
// tasks can import and use it at build-script evaluation time.
// Version catalogs are unavailable in buildscript{}, so the version is read from
// gradle.properties (snakeyamlVersion), which is loaded before build-script evaluation.
buildscript {
    repositories { mavenCentral() }
    dependencies {
        classpath "org.yaml:snakeyaml:${snakeyamlVersion}"
    }
}

import groovy.xml.XmlParser
import com.github.spotbugs.snom.Confidence
import com.github.spotbugs.snom.Effort
import org.openapitools.generator.gradle.plugin.tasks.GenerateTask
import org.xml.sax.InputSource
import org.yaml.snakeyaml.Yaml
import org.yaml.snakeyaml.DumperOptions

import javax.xml.parsers.SAXParserFactory
import java.time.Instant
import java.time.ZoneId
import java.time.format.DateTimeFormatter

plugins {
    id 'java-library'
    id 'maven-publish'
    alias(libs.plugins.openapi.generator)
    id 'jacoco'
    id 'checkstyle'
    alias(libs.plugins.spotbugs)
    alias(libs.plugins.spotless)
}

group   = 'markets.alpaca'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
    withSourcesJar()
    withJavadocJar()
}

repositories {
    mavenCentral()
}

// ---------------------------------------------------------------------------
// Formatting and static analysis
// ---------------------------------------------------------------------------
spotless {
    java {
        target 'src/**/*.java', 'examples/src/**/*.java'
        importOrder()
        removeUnusedImports()
        googleJavaFormat()
        formatAnnotations()
    }

    format 'misc', {
        target '*.gradle', '*.md', '*.properties', '*.toml', '*.yml', '*.yaml',
            '.gitignore',
            'examples/*.gradle', 'examples/*.md',
            'gradle/*.properties', 'gradle/*.toml'
        trimTrailingWhitespace()
        leadingTabsToSpaces(4)
        endWithNewline()
    }
}

checkstyle {
    toolVersion = '10.26.1'
    configDirectory = layout.projectDirectory.dir('config/checkstyle')
}

tasks.named('checkstyleMain').configure {
    source = fileTree('src/main/java') {
        include '**/*.java'
    }
}

tasks.named('checkstyleTest').configure {
    source = fileTree('src/test/java') {
        include '**/*.java'
    }
}

spotbugs {
    effort = Effort.valueOf('MAX')
    reportLevel = Confidence.valueOf('MEDIUM')
}

tasks.named('spotbugsMain').configure {
    dependsOn 'compileJava'
    sourceDirs = files('src/main/java')
    classes = fileTree(dir: layout.buildDirectory.dir('classes/java/main'), include: [
        'markets/alpaca/client/*.class',
        'markets/alpaca/client/broker/sse/**/*.class',
        'markets/alpaca/client/data/**/*.class',
        'markets/alpaca/client/http/**/*.class',
        'markets/alpaca/client/rest/**/*.class',
        'markets/alpaca/client/trading/**/*.class',
        'markets/alpaca/client/ws/**/*.class',
    ])
    auxClassPaths = files(sourceSets.main.compileClasspath, layout.buildDirectory.dir('classes/java/main'))
    excludeFilter = file('config/spotbugs/exclude.xml')
    reports {
        xml.required = false
        html.required = true
    }
}

tasks.named('spotbugsTest').configure {
    enabled = false
}

// ---------------------------------------------------------------------------
// OAS spec source configuration
// Each spec can be a local file path or a remote URL (http/https).
//
// Resolution order per spec (first match wins):
//   1. Individual Gradle property:       ./gradlew -PbrokerSpec=<path|url> build
//   2. Individual environment variable:  APCA_BROKER_SPEC=<path|url> ./gradlew build
//   3. local.properties individual key:  brokerSpec=<path|url>  (gitignored)
//   4. Legacy oasRoot (all three specs): ./gradlew -PoasRoot=/path/to/oas build
//      also: APCA_OAS_ROOT=/path/to/oas  or  oasRoot= in local.properties
//   5. Default: official Alpaca public API documentation URL
//
// Individual properties / env vars:
//   Spec     | Gradle property | Env variable
//   ---------|-----------------|-------------------
//   Broker   | brokerSpec      | APCA_BROKER_SPEC
//   Data     | dataSpec        | APCA_DATA_SPEC
//   Trading  | tradingSpec     | APCA_TRADING_SPEC
// ---------------------------------------------------------------------------
def localProps = new Properties()
def localPropsFile = file('local.properties')
if (localPropsFile.exists()) {
    localPropsFile.withInputStream { localProps.load(it) }
}

def firstNonBlank = { String... values ->
    values.find { it != null && !it.isBlank() }
}

// Legacy oasRoot — used only when no individual spec source is configured.
def oasRoot = (project.findProperty('oasRoot')
    ?: System.getenv('APCA_OAS_ROOT')
    ?: localProps.getProperty('oasRoot')) as String

// Default public URLs (used when no local source is configured).
def BROKER_SPEC_DEFAULT  = 'https://docs.alpaca.markets/openapi/broker-api.json'
def DATA_SPEC_DEFAULT    = 'https://docs.alpaca.markets/openapi/market-data-api.json'
def TRADING_SPEC_DEFAULT = 'https://docs.alpaca.markets/openapi/trading-api.json'

// Per-spec source: individual override → oasRoot-derived path → public URL default.
def brokerSpecSource = (project.findProperty('brokerSpec')
    ?: System.getenv('APCA_BROKER_SPEC')
    ?: localProps.getProperty('brokerSpec')
    ?: (oasRoot ? "${oasRoot}/broker/openapi.yaml" : null)
    ?: BROKER_SPEC_DEFAULT) as String

def dataSpecSource = (project.findProperty('dataSpec')
    ?: System.getenv('APCA_DATA_SPEC')
    ?: localProps.getProperty('dataSpec')
    ?: (oasRoot ? "${oasRoot}/data/openapi.yaml" : null)
    ?: DATA_SPEC_DEFAULT) as String

def tradingSpecSource = (project.findProperty('tradingSpec')
    ?: System.getenv('APCA_TRADING_SPEC')
    ?: localProps.getProperty('tradingSpec')
    ?: (oasRoot ? "${oasRoot}/trading/openapi.yaml" : null)
    ?: TRADING_SPEC_DEFAULT) as String

// Each API is generated into its own subdirectory to prevent task output conflicts
// and to allow Gradle incremental build to work correctly.
def generatedBrokerDir  = layout.buildDirectory.dir('generated/broker')
def generatedDataDir    = layout.buildDirectory.dir('generated/data')
def generatedTradingDir = layout.buildDirectory.dir('generated/trading')
def openApiTemplateDir  = layout.projectDirectory.dir('src/main/openapi-templates/Java')

// Preprocessed (sanitised) spec copies — intermediates, not committed.
def preprocessedBrokerSpec  = layout.buildDirectory.file('specs/broker/openapi.yaml')
def preprocessedDataSpec    = layout.buildDirectory.file('specs/data/openapi.yaml')
def preprocessedTradingSpec = layout.buildDirectory.file('specs/trading/openapi.yaml')

